name: Production Deployment

on:
  workflow_dispatch:
  # push:
  #   branches: ['main'] # Trigger deploy pipeline only on push to main branch

jobs:
  # STAGE 1: Linting and Testing (CI)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test

  # STAGE 2: Build and Push Docker Image
  build-and-push:
    needs: test-and-lint # Run only if linting and testing passed successfully
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Log in to Docker Hub Registry
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build and push the production-ready image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Using "latest" tag for the current production-ready version
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/react-app:latest

  # STAGE 3: Deploy to Remote VPS Server via SSH
  deploy:
    needs: build-and-push # Run only after the image has been successfully pushed
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Log in to Docker Hub on the remote server
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # 2. Pull the latest image from registry
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/react-app:latest

            # 3. Stop and remove the old container if it exists
            docker stop react-app-container || true
            docker rm react-app-container || true

            # 4. Run the new container on port 8080 (served by Nginx inside)
            docker run -d \
              --name react-app-container \
              -p 8080:80 \
              --restart always \
              ${{ secrets.DOCKER_HUB_USERNAME }}/react-app:latest
              
            # 5. Prune old unused Docker images to free up disk space
            docker image prune -f
